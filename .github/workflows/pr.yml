name: PR Build

on:
  pull_request: {}
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-server:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: 'true'
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: false
      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew
      - name: Gradle assemble
        run: ./gradlew :server:assemble
  build-cli:
    runs-on: self-hosted
    needs: build-server
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: 'true'
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: false
      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew
      - name: Gradle assemble
        run: ./gradlew :cli:app:assemble

  build-client:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: 'true'
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: false
      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew
      - name: Gradle assemble
        run: ./gradlew :client:composeApp:assemble
