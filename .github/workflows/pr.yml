name: PR Build

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-logic:
    runs-on:
      group: high-performance
      labels: macOS
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: 'true'
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: false
      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew
      - name: Check build-logic
        run: ./gradlew :build-logic:check

  build-server:
    runs-on: self-hosted
    needs: build-logic
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: 'true'
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: false
      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew

      - name: Gradle assemble
        run: ./gradlew :server:app:assemble
  build-cli:
    runs-on: self-hosted
    needs: build-server
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: 'true'
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: false
      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew
      - name: Gradle assemble
        run: ./gradlew :cli:app:assemble

  build-client:
    runs-on:
      group: high-performance
      labels: macOS
    needs: build-logic
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: 'true'
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: false
      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew
      - name: Gradle assemble
        run: ./gradlew :client:composeApp:assemble
